apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: garage-config
    namespace: garage
    files:
      - garage.toml=garage.toml
generatorOptions:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  disableNameSuffixHash: true
resources:
  # Core
  - namespace.yaml
  - externalsecret.yaml
  - application.yaml

  # Metrics
  - metrics-servicemonitor.yaml
