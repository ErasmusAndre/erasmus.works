apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: longhorn
  namespace: longhorn-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: longhorn
      app.kubernetes.io/name: longhorn
      app: longhorn-manager
  endpoints:
    - port: manager
      interval: 30s
