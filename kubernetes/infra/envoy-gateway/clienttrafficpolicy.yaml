apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: homelab
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab
  clientIPDetection:
    customHeader:
      # Cloudflare forwards the real client IP in CF-Connecting-IP for HTTP traffic.
      name: CF-Connecting-IP
