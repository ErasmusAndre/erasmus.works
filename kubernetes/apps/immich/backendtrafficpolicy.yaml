apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: immich
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: immich
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 3000
            unit: Minute
